name: quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install (use locked deps for reproducibility)
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check backend
      - name: Black (check)
        run: black --check backend
      - name: Mypy
        run: mypy backend || true
      - name: Pytest
        run: pytest
