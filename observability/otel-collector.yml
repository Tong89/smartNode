# OpenTelemetry Collector configuration for SmartNode
#
# Receives traces/metrics via OTLP, exports to Prometheus (metrics)
# and logs traces to stdout. In production, swap stdout exporter for
# a real backend (Jaeger, Tempo, etc.).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: "otel-collector"
          scrape_interval: 15s
          static_configs:
            - targets: ["0.0.0.0:8888"]

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

  resource:
    attributes:
      - key: service.namespace
        value: "smartnode"
        action: upsert

exporters:
  # Export traces to stdout for local development
  debug:
    verbosity: basic

  # Export metrics to Prometheus (pull model)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "otelcol"

  # Forward traces as OTLP to Prometheus-compatible backend
  # Uncomment and configure for production Jaeger / Tempo:
  # otlp/jaeger:
  #   endpoint: jaeger:4317
  #   tls:
  #     insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
