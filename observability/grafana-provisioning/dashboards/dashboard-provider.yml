# Grafana dashboard provisioning — load dashboards from disk
apiVersion: 1

providers:
  - name: SmartNode
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
